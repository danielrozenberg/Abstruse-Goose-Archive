<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abstruse Goose Archive</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
</head>
<body>

  <div id="loading-overlay" aria-live="polite">Loading archive…</div>

  <div id="progress-container" hidden aria-hidden="true">
    <div id="progress-bar"></div>
  </div>

  <header id="site-header">
    <a href="./" id="logo-link" aria-label="Abstruse Goose Archive — home">
      <img src="AGlogo.PNG" alt="Abstruse Goose" id="logo">
    </a>
    <a href="./index" id="nav-index">All Comics</a>
    <div id="search-container" role="search">
      <input
        type="search"
        id="search-input"
        placeholder="Search… (/ to focus)"
        autocomplete="off"
        aria-label="Search comics"
        aria-autocomplete="list"
        aria-controls="search-results"
        aria-expanded="false"
      >
      <div id="search-results" role="listbox" aria-label="Search results" hidden></div>
    </div>
  </header>

  <!-- ── Comic view ─────────────────────────────────────────────────────────── -->
  <div id="view-comic" class="view">
    <main id="comic-main">

      <nav id="comic-nav" aria-label="Comic navigation">
        <a id="btn-prev" aria-label="Previous comic">&#8592; Prev</a>
        <div id="comic-info">
          <span id="comic-number"></span>
          <span id="comic-title"></span>
        </div>
        <a id="btn-next" aria-label="Next comic">Next &#8594;</a>
      </nav>

      <div id="comic-display">
        <div id="comic-spinner" hidden role="status" aria-label="Loading image">
          <div class="spinner-ring"></div>
        </div>
        <img id="comic-image" alt="">
        <div id="comic-missing" hidden>
          <p>This comic was removed from the original archive.</p>
        </div>
      </div>

      <div id="comic-comment" hidden></div>

      <div id="comic-transcript-area">
        <button id="btn-transcript">Show transcript</button>
        <div id="transcript-panel" hidden>
          <div id="transcript-content"></div>
        </div>
      </div>

      <div id="comic-footer">
        <button id="btn-random">Random</button>
      </div>

    </main>
  </div>

  <!-- ── Index view ─────────────────────────────────────────────────────────── -->
  <div id="view-index" class="view" hidden>
    <main id="index-main">
      <h1>All Comics <span id="index-count"></span></h1>
      <div id="index-list"></div>
    </main>
  </div>

  <footer id="site-footer">
    <p>
      Abstruse Goose by an anonymous author &mdash;
      archived under <a href="LICENSE" target="_blank" rel="noopener">CC BY-NC 3.0</a>.
      Original site went offline in 2023.
    </p>
  </footer>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.mjs');
  </script>
  <script src="js/app.mjs" type="module"></script>
</body>
</html>
